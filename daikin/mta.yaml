_schema-version: "3.1"
ID: FIEM-app
version: 1.0.0

modules:

  - name: FIEM-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: FIEM-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: FIEM-ui
          artifacts:
            - '*.zip'
          target-path: 'resources/'

  - name: FIEM-ui
    type: html5
    path: .
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build
      build-result: dist
      supported-platforms: []

  - name: FIEM-app
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 256M
      disk-quota: 512M
    requires:
      - name: FIEM-destination-service
      - name: FIEM-connectivity-service
      - name: FIEM-xsuaa-service
      - name: FIEM-repo-runtime
    provides:
      - name: approuter-api
        properties:
          url: ${default-url}

resources:

  - name: FIEM-destination-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true

  - name: FIEM-connectivity-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: connectivity
      service-plan: lite

  - name: FIEM-xsuaa-service
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: FIEM-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-name: FIEM-html5-service
      service-plan: app-host

  - name: FIEM-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true